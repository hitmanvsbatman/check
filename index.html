<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <div class="container">

        <!-- Heading Box -->
        <div class="box heading-box">
            <h1>Love Calculator ❤️</h1>
        </div>

        <!-- Boy Input Box -->
        <div class="box input-box">
            <label>Boy Name:</label>
            <input type="text" id="boyName" placeholder="Enter boy name">
        </div>

        <!-- Girl Input Box -->
        <div class="box input-box">
            <label>Girl Name:</label>
            <input type="text" id="girlName" placeholder="Enter girl name">
        </div>

        <!-- Button Box -->
        <div class="box button-box">
            <button id="calculateBtn">Calculate Love</button>
        </div>

        <!-- Result Box -->
        <div class="box result-box">
            <h2 id="result">Result will appear here</h2>
        </div>

    </div>

    <!-- CSS Link -->
    <link rel="stylesheet" href="style.css">

    <!-- JavaScript Link -->
    <script src="script.js"></script>

</body>
</html>
